basePath: /
definitions:
  dto.CreateAuthorRequest:
    properties:
      bio:
        maxLength: 500
        type: string
      name:
        maxLength: 100
        minLength: 2
        type: string
    required:
    - name
    type: object
  dto.CreateBookRequest:
    properties:
      author_id:
        minimum: 1
        type: integer
      isbn:
        type: string
      publisher_id:
        minimum: 1
        type: integer
      title:
        maxLength: 255
        minLength: 1
        type: string
      year:
        maximum: 2100
        minimum: 1000
        type: integer
    required:
    - author_id
    - isbn
    - publisher_id
    - title
    - year
    type: object
  dto.CreatePublisherRequest:
    properties:
      address:
        maxLength: 255
        type: string
      name:
        maxLength: 100
        minLength: 2
        type: string
    required:
    - name
    type: object
  dto.UpdateAuthorRequest:
    properties:
      bio:
        maxLength: 500
        type: string
      name:
        maxLength: 100
        minLength: 2
        type: string
    required:
    - name
    type: object
  dto.UpdateBookRequest:
    properties:
      author_id:
        minimum: 1
        type: integer
      isbn:
        type: string
      publisher_id:
        minimum: 1
        type: integer
      title:
        maxLength: 255
        minLength: 1
        type: string
      year:
        maximum: 2100
        minimum: 1000
        type: integer
    required:
    - author_id
    - isbn
    - publisher_id
    - title
    - year
    type: object
  dto.UpdatePublisherRequest:
    properties:
      address:
        maxLength: 255
        type: string
      name:
        maxLength: 100
        minLength: 2
        type: string
    required:
    - name
    type: object
  handler.loginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  handler.refreshRequest:
    properties:
      refresh_token:
        type: string
    required:
    - refresh_token
    type: object
  handler.registerRequest:
    properties:
      confirm_password:
        type: string
      email:
        maxLength: 100
        type: string
      password:
        maxLength: 72
        minLength: 8
        type: string
    required:
    - confirm_password
    - email
    - password
    type: object
  response.Meta:
    properties:
      limit:
        type: integer
      page:
        type: integer
      total:
        type: integer
      total_pages:
        type: integer
    type: object
  response.Response:
    properties:
      data: {}
      message:
        type: string
      meta:
        $ref: '#/definitions/response.Meta'
      success:
        type: boolean
    type: object
host: localhost:8080
info:
  contact: {}
  description: RESTful API for book catalogue management
  title: Gits Catalogue API
  version: "1.0"
paths:
  /api/v1/authors:
    get:
      parameters:
      - description: 'Page number (default: 1)'
        in: query
        name: page
        type: integer
      - description: 'Items per page (default: 10, max: 100)'
        in: query
        name: limit
        type: integer
      - description: Search by name
        in: query
        name: search
        type: string
      - description: 'Sort field (default: id)'
        in: query
        name: sort
        type: string
      - description: 'Sort order: ASC or DESC (default: ASC)'
        in: query
        name: order
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - BearerAuth: []
      summary: List all authors
      tags:
      - authors
    post:
      consumes:
      - application/json
      parameters:
      - description: Author data
        in: body
        name: author
        required: true
        schema:
          $ref: '#/definitions/dto.CreateAuthorRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/response.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - BearerAuth: []
      summary: Create an author
      tags:
      - authors
  /api/v1/authors/{id}:
